<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin Kraemer — Interactive CV</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 2.5rem 1rem 1rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .tagline {
      margin-top: 0.4rem;
      font-size: 1rem;
      color: #8b949e;
      letter-spacing: 0.5px;
    }

    main {
      width: 100%;
      max-width: 1600px;
      padding: 1rem 1rem 2rem;
      flex: 1;
      display: flex;
      gap: 1rem;
      align-items: stretch;
    }

    #sankey {
      flex: 3;
      min-width: 0;
      height: 70vh;
    }

    #detail-panel {
      flex: 1;
      min-width: 0;
      height: 70vh;
      border-left: 1px solid #30363d;
      padding: 1.5rem 1.25rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #detail-panel .panel-instruction {
      color: #8b949e;
      font-style: italic;
      font-size: 0.9rem;
      margin: auto 0;
      text-align: center;
    }

    #detail-panel .panel-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e6edf3;
      border-bottom: 1px solid #30363d;
      padding-bottom: 0.5rem;
    }

    #detail-panel .panel-subtitle {
      font-size: 0.85rem;
      color: #8b949e;
      margin-top: -0.25rem;
    }

    #detail-panel .panel-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #detail-panel .panel-items li::before {
      content: "· ";
      color: #8b949e;
    }

    #detail-panel .panel-items li {
      font-size: 0.875rem;
      color: #c9d1d9;
      line-height: 1.5;
    }

    #detail-panel .panel-link {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.85rem;
      color: #58a6ff;
      text-decoration: none;
    }

    #detail-panel .panel-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Kevin Kraemer</h1>
    <p class="tagline">Interactive CV</p>
  </header>
  <main>
    <div id="sankey"></div>
    <div id="detail-panel">
      <p class="panel-instruction">Knoten anklicken für Details</p>

    const nodeData = {

      },
      13: {

        items: [

        ],
      },
      14: {

        items: [

      },
      15: {

        items: [

          "Mathematische und physikalische Modellierung unter Unsicherheit",
        ],
      },
      16: {

        items: [

          "EPFL-Auslandssemester: Laborpraktikum zu solar-thermischen Wasserreinigungsprototypen",
        ],
      },
      17: {

        items: [

        ],
      },
      // Ergebnisse
      18: {
        title: "Veröffentlichungen",
        items: [
          "Goal100 Windreport 2025_2 (Jun. 2025) – Analyse des Status quo und Modellierung der Prognose",
          "Umweltbundesamt: Analyse eines Unternehmensentwertungsrechts für Strom-Herkunftsnachweise in Deutschland, Climate Change 24/2023",
        ],
      },
      19: {

        items: [
          "Preisprognosemodell für europäische Herkunftsnachweise bis 2030 (enervis)",
          "Gemischt-ganzzahlige Optimierung zur Erlösprognose von Batteriespeichern und erneuerbaren Anlagen (enervis)",
          "Bottom-Up-Prognosemodell für den deutschen Windenergie-Ausbau bis 2035 (ProjectTogether)",
        ],
      },
      20: {

        items: [
          "ETL-Pipeline: heterogene Datenquellen → S3 → PostgreSQL für goal100.studio",
          "Datenpreprocessing von Behördendaten für den Goal100 Monitor",

        ],
      },
      21: {

        items: [

        ],

      22: {

        items: [
          "open-MaStR: Python-Bibliothek zur Abfrage und Aufbereitung des Marktstammdatenregisters (BNetzA)",

          "Implementierung eines partiellen Downloads für v0.16.0",
          "Verantwortlicher für das Release von v0.17.0",
          "Bearbeitung von Issues und Review von Pull Requests",
        ],
        url: "https://github.com/OpenEnergyPlatform/open-MaStR",
      },
      23: {
        title: "Forschungsprojekte",
        items: [
          "Bachelorarbeit: Performance Evaluation of Supercapacitors Employing Nanoporous Carbon Materials – Leibniz-Institut für Neue Materialien",
          "Masterarbeit: Machine Learning Approaches for Population Estimation for Travel Demand Modelling – KIT / PTV Group",
        ],
      },
    };

    const panel = document.getElementById("detail-panel");

    function renderPanel(idx) {
      const d = nodeData[idx];
      if (!d) {
        panel.innerHTML = '<p class="panel-instruction">Keine Details verfügbar.</p>';
        return;
      }
      const subtitle = d.subtitle
        ? `<p class="panel-subtitle">${d.subtitle}</p>`
        : "";
      const items = d.items
        .map(item => `<li>${item}</li>`)
        .join("");
      const link = d.url
        ? `<a class="panel-link" href="${d.url}" target="_blank" rel="noopener">Zum Projekt →</a>`
        : "";
      panel.innerHTML = `
        <h2 class="panel-title">${d.title}</h2>
        ${subtitle}
        <ul class="panel-items">${items}</ul>
        ${link}
      `;
    }

    function resetPanel() {
      panel.innerHTML = '<p class="panel-instruction">Knoten anklicken für Details</p>';
    }

    function evenY(n) {
      return Array.from({length: n}, (_, i) => (i + 0.5) / n);
    }
    const nodeX = [...Array(5).fill(0.001), ...Array(13).fill(0.5), ...Array(6).fill(0.999)];
    const nodeY = [...evenY(5), ...evenY(13), ...evenY(6)];

    const data = [{
      type: "sankey",
      orientation: "h",
      node: {
        pad: 20,
        thickness: 24,
        line: { color: "#30363d", width: 0.5 },
        label: nodeLabels,
        color: nodeColors,
        x: nodeX,
        y: nodeY,
        hovertemplate: "<b>%{label}</b><extra></extra>",
      },
      link: {
        source: linkSource,
        target: linkTarget,
        value: linkValue,
        color: "rgba(150, 150, 180, 0.25)",
        hovertemplate: "%{source.label} → %{target.label}<extra></extra>",
      },
    }];

    const layout = {
      paper_bgcolor: "#0d1117",
      plot_bgcolor: "#0d1117",
      font: { color: "#e6edf3", family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", size: 13 },
      margin: { l: 20, r: 20, t: 10, b: 10 },
    };

    const defaultLinkColor = "rgba(150, 150, 180, 0.25)";
    const activeLinkColor  = "rgba(150, 150, 180, 0.7)";
    const dimLinkColor     = "rgba(150, 150, 180, 0.04)";
    let activeNode = null;

    function dimColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},0.15)`;
    }

    function applyHighlight(gd, nodeIndex) {
      const connectedLinks = new Set();
      const connectedNodes = new Set([nodeIndex]);
      linkSource.forEach((src, i) => {
        if (src === nodeIndex || linkTarget[i] === nodeIndex) {
          connectedLinks.add(i);
          connectedNodes.add(src);
          connectedNodes.add(linkTarget[i]);
        }
      });
      Plotly.restyle(gd, {
        "link.color": [linkSource.map((_, i) => connectedLinks.has(i) ? activeLinkColor : dimLinkColor)],
        "node.color": [nodeColors.map((c, i) => connectedNodes.has(i) ? c : dimColor(c))],
      });
    }

    function resetHighlight(gd) {
      Plotly.restyle(gd, {
        "link.color": [linkSource.map(() => defaultLinkColor)],
        "node.color": [nodeColors.slice()],
      });
    }

    Plotly.newPlot("sankey", data, layout, { responsive: true, displayModeBar: false })
      .then(function(gd) {
        gd.on("plotly_click", function(eventData) {
          if (!eventData.points.length) return;
          const pt = eventData.points[0];
          // Link clicks have a 'source' property; node clicks don't
          if (pt.source !== undefined) return;
          const idx = pt.pointNumber;
          if (activeNode === idx) {
            activeNode = null;
            resetHighlight(gd);
            resetPanel();
          } else {
            activeNode = idx;
            applyHighlight(gd, idx);
            renderPanel(idx);
          }
        });

        gd.on("plotly_doubleclick", function() {
          activeNode = null;
          resetHighlight(gd);
          resetPanel();
        });
      });
  </script>
</body>
</html>
